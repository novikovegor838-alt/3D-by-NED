name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-lastest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flet 
      - run: flet pack main.py --name "3D by NED" --add-data ".";"" --android
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: dist/*.apk
